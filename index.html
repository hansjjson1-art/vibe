<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureCorp Internal Portal (v1.0-unpatched)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: Arial, sans-serif; background:#e5e7eb; }
  .retro { background:#f3f4f6; border:2px solid #9ca3af; }
</style>
</head>
<body class="p-6">

<h1 class="text-2xl font-bold mb-4">SecureCorp 보안 점검 모드</h1>

<!-- LOGIN -->
<div class="retro p-4 mb-6">
  <h2 class="font-bold mb-2">로그인</h2>
  <input id="loginId" class="border p-1 mr-2" placeholder="ID">
  <input id="loginPw" class="border p-1 mr-2" placeholder="Password">
  <button onclick="login()" class="bg-blue-500 text-white px-3 py-1">Login</button>
  <div id="loginResult" class="mt-2 text-sm"></div>
</div>

<!-- SEARCH -->
<div class="retro p-4 mb-6">
  <h2 class="font-bold mb-2">사원 검색</h2>
  <input id="searchInput" class="border p-1 mr-2" placeholder="이름 검색">
  <button onclick="search()" class="bg-green-500 text-white px-3 py-1">Search</button>

  <table class="mt-4 w-full border">
    <thead>
      <tr class="bg-gray-300">
        <th>ID</th><th>Name</th><th>Dept</th><th>Phone</th>
      </tr>
    </thead>
    <tbody id="resultTable"></tbody>
  </table>
</div>

<!-- LOG -->
<div class="retro p-4">
  <h2 class="font-bold mb-2">SQL Query Log</h2>
  <pre id="sqlLog" class="bg-black text-green-400 p-2 text-xs h-32 overflow-auto"></pre>
  <h2 class="font-bold mt-4 mb-2">DB Result (JSON)</h2>
  <pre id="jsonLog" class="bg-black text-yellow-300 p-2 text-xs h-32 overflow-auto"></pre>
</div>

<script>
// MOCK DATABASE
const MOCK_DB = {
  users: [
    {id:'admin', pw:'1234'},
    {id:'user1', pw:'1111'}
  ],
  employees: [
    {id:1, name:'Kim', dept:'HR', phone:'010-1111'},
    {id:2, name:'Lee', dept:'IT', phone:'010-2222'},
    {id:3, name:'Park', dept:'Finance', phone:'010-3333'}
  ]
};

function logSQL(query, result) {
  document.getElementById('sqlLog').textContent = query;
  document.getElementById('jsonLog').textContent = JSON.stringify(result, null, 2);
}

// LOGIN (취약)
function login() {
  const id = document.getElementById('loginId').value;
  const pw = document.getElementById('loginPw').value;

  // 취약한 쿼리 생성
  const query = `SELECT * FROM users WHERE id='${id}' AND pw='${pw}'`;

  let result = [];

  try {
    result = MOCK_DB.users.filter(u => eval(`u.id=='${id}' && u.pw=='${pw}'`));
  } catch(e) {
    result = [];
  }

  logSQL(query, result);

  document.getElementById('loginResult').textContent =
    result.length > 0 ? '로그인 성공' : '로그인 실패';
}

// SEARCH (취약 + UNION 시뮬레이션)
function search() {
  const keyword = document.getElementById('searchInput').value;

  const query = `SELECT id,name,dept,phone FROM employees WHERE name LIKE '%${keyword}%'`;

  let result = [];

  try {
    // 기본 검색
    result = MOCK_DB.employees.filter(e => eval(`e.name.includes('${keyword}')`));

    // UNION 공격 시뮬레이션
    if(keyword.toLowerCase().includes('union')) {
      result = result.concat([
        {id:'hack', name:'admin_pw', dept:'1234', phone:'leak'}
      ]);
    }

  } catch(e) {
    result = [];
  }

  logSQL(query, result);

  const tbody = document.getElementById('resultTable');
  tbody.innerHTML = '';

  result.forEach(r => {
    const row = `<tr>
      <td>${r.id}</td>
      <td>${r.name}</td>
      <td>${r.dept}</td>
      <td>${r.phone}</td>
    </tr>`;
    tbody.innerHTML += row;
  });
}
</script>

</body>
</html>
